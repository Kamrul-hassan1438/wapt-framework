version: "3.9"

services:

  # ── Backend API ────────────────────────────────────────────────
  api:
    build: .
    container_name: wapt-api
    ports:
      - "8000:8000"
    volumes:
      - ./reports/output:/app/reports/output
      - ./logs:/app/logs
      - ./wapt.db:/app/wapt.db
      - ./plugins:/app/plugins
    environment:
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_URL=sqlite+aiosqlite:///./wapt.db
      - LOG_LEVEL=INFO
      - DEFAULT_RATE_LIMIT=5
    restart: unless-stopped
    networks:
      - wapt-net
    # Nmap requires network capabilities
    cap_add:
      - NET_RAW
      - NET_ADMIN

  # ── React Frontend ─────────────────────────────────────────────
  ui:
    image: node:20-alpine
    container_name: wapt-ui
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - api
    networks:
      - wapt-net

networks:
  wapt-net:
    driver: bridge