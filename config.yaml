app:
  name: "WAPT Framework"
  version: "0.1.0"
  description: "Web Application Penetration Testing Framework"

scan:
  default_rate_limit: 5        # requests/second
  default_timeout: 10          # seconds per request
  max_redirects: 5

scope:
  # Domains that can NEVER be tested regardless of user input
  always_blocked:
    - "google.com"
    - "facebook.com"
    - "amazon.com"
    - "cloudflare.com"
  allowed_schemes:
    - "http"
    - "https"

logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name} | {message}"
  rotation: "10 MB"
  retention: "7 days"

reporting:
  severities:
    - name: "Critical"
      color: "#d32f2f"
      cvss_range: [9.0, 10.0]
    - name: "High"
      color: "#f57c00"
      cvss_range: [7.0, 8.9]
    - name: "Medium"
      color: "#fbc02d"
      cvss_range: [4.0, 6.9]
    - name: "Low"
      color: "#388e3c"
      cvss_range: [0.1, 3.9]
    - name: "Info"
      color: "#1976d2"
      cvss_range: [0.0, 0.0]